<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SplitSpree</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>

  <!-- ── Home view: group list ─────────────────────────────── -->
  <div id="view-home" class="view active">
    <header class="app-header">
      <h1 class="app-title">SplitSpree</h1>
      <p class="app-tagline">Splitwise but free so you go on a spree</p>
    </header>

    <section class="section">
      <h2>Create a Group</h2>
      <div class="form-row">
        <input id="new-group-name"    type="text" placeholder="Group name (e.g. Tokyo trip)" />
        <input id="new-group-members" type="text" placeholder="Members, comma-separated (e.g. Alice, Bob, Charlie)" />
        <button id="create-group-btn" class="btn btn--primary">Create Group</button>
      </div>
    </section>

    <section class="section">
      <h2>Your Groups</h2>
      <div id="group-list"><!-- filled by renderGroupList() --></div>
    </section>
  </div>

  <!-- ── Group detail view ─────────────────────────────────── -->
  <div id="view-group" class="view">
    <header class="app-header">
      <button id="back-btn" class="btn btn--ghost">← Back</button>
      <h1 id="group-title" class="app-title"></h1>
    </header>

    <section class="section">
      <h2>Members</h2>
      <div id="member-list"><!-- filled by renderMemberList() --></div>
    </section>

    <section class="section">
      <h2>Add Expense</h2>
      <div class="form-row">
        <input id="new-expense-desc"    type="text"   placeholder="Description (e.g. Dinner)" />
        <input id="new-expense-amount"  type="number" placeholder="Amount" min="0" step="any" />
        <input id="new-expense-paid-by" type="text"   placeholder="Paid by (member name)" />
        <button id="add-expense-btn" class="btn btn--primary">Add Expense</button>
      </div>
    </section>

    <section class="section">
      <h2>Expenses</h2>
      <div id="expense-list"><!-- filled by renderExpenseList() --></div>
    </section>

    <section class="section">
      <h2>Balances</h2>
      <div id="balance-list"><!-- filled by renderBalanceSummary() --></div>
    </section>

    <section class="section">
      <h2>Settle Up</h2>
      <div id="settlement-list"><!-- filled by renderBalanceSummary() --></div>
    </section>
  </div>

  <!-- JS — load order matters: each file depends on the one above it -->
  <script src="js/storage.js"></script>
  <script src="js/groups.js"></script>
  <script src="js/expenses.js"></script>
  <script src="js/balances.js"></script>
  <script src="js/ui.js"></script>

</body>
</html>
